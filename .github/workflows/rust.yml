name: CI

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets

  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Build (debug)
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

  build-release:
    name: Build Release (${{ matrix.target.os }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: ubuntu-latest
            os: linux
            suffix: ""
          - runner: windows-latest
            os: windows
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --workspace --release --verbose

      - name: Collect binaries
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/perlica-game-server${{ matrix.target.suffix }}   dist/
          cp target/release/perlica-config-server${{ matrix.target.suffix }} dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perlica-${{ matrix.target.os }}
          path: dist/
          if-no-files-found: error

  release-dev:
    name: Dev Release
    runs-on: ubuntu-latest
    needs: [fmt, build, build-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: perlica-linux
          path: release/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: perlica-windows
          path: release/windows

      - name: Rename artifacts
        run: |
          mv release/linux/perlica-game-server         release/perlica-game-server-linux
          mv release/linux/perlica-config-server       release/perlica-config-server-linux
          mv release/windows/perlica-game-server.exe   release/perlica-game-server-windows.exe
          mv release/windows/perlica-config-server.exe release/perlica-config-server-windows.exe

      - name: Publish dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: "dev - ${{ github.sha }}"
          body: |
            Automated dev build from master.

            **Commit:** ${{ github.sha }}
            ${{ github.event.head_commit.message }}

            > This is a rolling pre-release build and may be unstable.
          prerelease: true
          files: |
            release/perlica-game-server-linux
            release/perlica-config-server-linux
            release/perlica-game-server-windows.exe
            release/perlica-config-server-windows.exe

  # Usage:
  #   git tag v1.0.0
  #   git push origin v1.0.0
  release-tagged:
    name: Tagged Release
    runs-on: ubuntu-latest
    needs: [fmt, build, build-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: perlica-linux
          path: release/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: perlica-windows
          path: release/windows

      - name: Rename artifacts
        run: |
          mv release/linux/perlica-game-server         release/perlica-game-server-linux
          mv release/linux/perlica-config-server       release/perlica-config-server-linux
          mv release/windows/perlica-game-server.exe   release/perlica-game-server-windows.exe
          mv release/windows/perlica-config-server.exe release/perlica-config-server-windows.exe

      - name: Extract changelog for ${{ github.ref_name }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" \
            changelog.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for ${VERSION}" > release_notes.md
          fi

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          body_path: release_notes.md
          prerelease: false
          files: |
            release/perlica-game-server-linux
            release/perlica-config-server-linux
            release/perlica-game-server-windows.exe
            release/perlica-config-server-windows.exe
